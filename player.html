<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>מקשיבים לבטיחות — שחקן</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;800;900&family=Secular+One&display=swap" rel="stylesheet">
<style>
:root{--pm:#9333EA;--pl:#C084FC;--or:#FF6B00;--dark:#0F0A1A;--pan:#1A0F2E;--pan2:#231540;--gold:#FFD700;--ok:#00CC6A;--err:#FF4444}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Heebo',sans-serif;background:var(--dark);color:#fff;direction:rtl;min-height:100vh;display:flex;flex-direction:column}
.screen{display:none;flex:1;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:14px}
.screen.active{display:flex}
h1,h2{font-family:'Secular One',sans-serif}

#join-screen h1{font-size:1.8rem;color:var(--pl);text-align:center}
.emoji-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;width:100%;max-width:320px}
.emoji-btn{background:var(--pan);border:2px solid var(--pan2);border-radius:12px;padding:12px 0;font-size:1.6rem;cursor:pointer;transition:all .15s}
.emoji-btn.sel{border-color:var(--pm);background:rgba(147,51,234,.3);transform:scale(1.1)}
#name-input{width:100%;max-width:320px;padding:14px 16px;font-size:1rem;border-radius:12px;border:2px solid var(--pan2);background:var(--pan);color:#fff;font-family:'Heebo';text-align:right}
#name-input:focus{outline:none;border-color:var(--pm)}
#join-btn{width:100%;max-width:320px;background:linear-gradient(135deg,var(--pm),var(--or));color:#fff;border:none;border-radius:14px;padding:16px;font-size:1.2rem;font-family:'Secular One';cursor:pointer}
#join-err{color:var(--err);font-size:14px;text-align:center;display:none}

#wait-screen{text-align:center}
.wait-anim{font-size:3rem;animation:spin-slow 2s linear infinite}
@keyframes spin-slow{from{transform:rotate(0)}to{transform:rotate(360deg)}}
#wait-name{font-size:1.4rem;font-weight:700}
.wait-tips{background:var(--pan);border-radius:14px;padding:16px;width:100%;max-width:360px;font-size:13px;color:#aaa;text-align:right;line-height:1.9}
#my-score-wait{font-family:'Secular One';font-size:1.8rem;color:var(--gold)}

#q-screen{gap:12px;max-width:480px;width:100%}
.q-header{width:100%;display:flex;justify-content:space-between;align-items:center;gap:8px}
#q-cat-p{font-size:12px;background:var(--pm);padding:4px 10px;border-radius:20px;flex-shrink:0}
#q-pts-p{font-family:'Secular One';color:var(--gold);font-size:1.1rem}
#p-timer{font-family:'Secular One';font-size:2rem;color:var(--gold);min-width:44px;text-align:center}
#p-timer.urgent{color:var(--err);animation:blink .5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
#q-text-p{font-size:1.2rem;font-weight:700;text-align:center;line-height:1.5;width:100%}
#q-img-p{max-width:100%;max-height:180px;border-radius:12px;object-fit:cover;display:none}
.p-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%}
.p-opt-btn{background:var(--pan);border:2px solid var(--pan2);border-radius:12px;padding:14px 12px;text-align:center;cursor:pointer;font-size:1rem;font-family:'Heebo';color:#fff;transition:all .15s}
.p-opt-btn:hover:not(:disabled){border-color:var(--pl)}
.p-opt-btn.selected{border-color:var(--pm);background:rgba(147,51,234,.4)}
.p-opt-btn.correct{background:rgba(0,204,106,.2);border-color:var(--ok);color:var(--ok);font-weight:700}
.p-opt-btn.wrong{background:rgba(255,68,68,.2);border-color:var(--err);color:var(--err)}
.p-opt-btn:disabled{cursor:default}
#answered-msg{display:none;text-align:center;color:var(--pl);font-size:14px;padding:10px;line-height:1.6}

#reveal-popup{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:50;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:24px;text-align:center}
#reveal-popup.show{display:flex}
#reveal-result{font-size:3.5rem}
#pts-gained{font-family:'Secular One';font-size:1.6rem;color:var(--gold)}
#reveal-correct-text{font-size:1rem;color:#aaa}
#reveal-expl{font-size:14px;color:#ccc;max-width:340px;line-height:1.6;background:var(--pan);padding:12px 16px;border-radius:10px;border-right:4px solid var(--ok)}
#reveal-wait{color:var(--pl);font-size:14px;margin-top:6px}

#end-screen-p{text-align:center}
#end-screen-p h2{color:var(--gold);font-size:2rem}
#final-score{font-family:'Secular One';font-size:3rem;color:var(--gold)}
#final-rank{color:#aaa;font-size:1rem}
</style>
</head>
<body>

<div id="join-screen" class="screen active">
  <h1>🎧 מקשיבים לבטיחות</h1>
  <p style="color:#aaa;font-size:14px">בחר אמוג'י ושם</p>
  <div class="emoji-grid" id="emoji-grid">
    <button class="emoji-btn sel" data-em="😊">😊</button>
    <button class="emoji-btn" data-em="🎯">🎯</button>
    <button class="emoji-btn" data-em="🔥">🔥</button>
    <button class="emoji-btn" data-em="⚡">⚡</button>
    <button class="emoji-btn" data-em="🏆">🏆</button>
    <button class="emoji-btn" data-em="🎸">🎸</button>
    <button class="emoji-btn" data-em="🦁">🦁</button>
    <button class="emoji-btn" data-em="🚀">🚀</button>
    <button class="emoji-btn" data-em="🌟">🌟</button>
    <button class="emoji-btn" data-em="💪">💪</button>
  </div>
  <input id="name-input" type="text" placeholder="שם שלך" maxlength="16">
  <div id="join-err">נא להזין שם</div>
  <button id="join-btn" onclick="window.joinGame()">הצטרף למשחק ←</button>
</div>

<div id="wait-screen" class="screen">
  <div class="wait-anim">🎧</div>
  <div id="wait-name"></div>
  <p style="color:#aaa;font-size:14px">⏳ ממתינים שהמנחה יתחיל...</p>
  <div class="wait-tips">
    📱 השאר את המסך דולק<br>
    ⚡ ענה מהר — יש בונוס מהירות<br>
    🏆 הניקוד מצטבר בכל שאלה
  </div>
  <div style="font-size:14px;color:#aaa">ניקוד: <span id="my-score-wait">0</span></div>
</div>

<div id="q-screen" class="screen">
  <div class="q-header">
    <span id="q-cat-p"></span>
    <span id="q-pts-p"></span>
    <span id="p-timer">30</span>
  </div>
  <div id="q-text-p"></div>
  <img id="q-img-p" src="" alt="">
  <div class="p-opts" id="p-opts"></div>
  <div id="answered-msg">✅ תשובתך נרשמה!<br><span style="color:#888;font-size:12px">ממתינים שהמנחה יחשוף את התשובה</span></div>
</div>

<div id="reveal-popup">
  <div id="reveal-result"></div>
  <div id="pts-gained"></div>
  <div id="reveal-correct-text"></div>
  <div id="reveal-expl"></div>
  <div id="reveal-wait">⏳ ממתין לשאלה הבאה...</div>
</div>

<div id="end-screen-p" class="screen">
  <h2>🏆 המשחק הסתיים!</h2>
  <div id="final-score">0</div>
  <div style="color:#aaa">נקודות</div>
  <div id="final-rank"></div>
  <p style="color:#555;font-size:13px;margin-top:16px">תודה על השתתפותך!</p>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, set, onValue, onDisconnect }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyCmLcDXYa0OR0CtTj0A3oPBlcD5C2JaA1E",
  authDomain: "noise-game-75903.firebaseapp.com",
  databaseURL: "https://noise-game-75903-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "noise-game-75903",
  storageBucket: "noise-game-75903.firebasestorage.app",
  messagingSenderId: "621096210813",
  appId: "1:621096210813:web:2e9c686a948517e9e1bc14"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const SESSION = new URLSearchParams(location.search).get('s') || 'game_default';

let myId='p_'+Math.random().toString(36).slice(2,9);
let myEmoji='😊', myName='', myScore=0, myLastAnswer=-1;
let answered=false, qStartTime=0, timerInt=null, lastQId=null;

document.querySelectorAll('.emoji-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.emoji-btn').forEach(b=>b.classList.remove('sel'));
    btn.classList.add('sel');
    myEmoji=btn.dataset.em;
  });
});

function joinGame(){
  const name=document.getElementById('name-input').value.trim();
  if(!name){document.getElementById('join-err').style.display='block';return;}
  document.getElementById('join-err').style.display='none';
  myName=name;
  const pRef=ref(db,`${SESSION}/players/${myId}`);
  set(pRef,{name,emoji:myEmoji,score:0});
  onDisconnect(pRef).remove();
  document.getElementById('wait-name').textContent=myEmoji+' '+name;
  showScreen('wait-screen');
  startListening();
}

function startListening(){
  onValue(ref(db,`${SESSION}/players/${myId}/score`),snap=>{
    myScore=snap.val()||0;
    document.getElementById('my-score-wait').textContent=myScore;
  });

  onValue(ref(db,`${SESSION}/gameState`),snap=>{
    if(snap.val()==='end') showEndScreen();
  });

  onValue(ref(db,`${SESSION}/currentQ`),snap=>{
    const q=snap.val();
    if(!q||lastQId===q.qId) return;
    lastQId=q.qId;
    document.getElementById('reveal-popup').classList.remove('show');
    answered=false; myLastAnswer=-1;
    showQuestion(q);
  });

  onValue(ref(db,`${SESSION}/correct`),snap=>{
    const correct=snap.val();
    if(correct===null||correct===undefined) return;
    doReveal(correct);
  });
}

function showQuestion(q){
  showScreen('q-screen');
  document.getElementById('q-cat-p').textContent=q.cat;
  document.getElementById('q-pts-p').textContent=q.pts+" נק'";
  document.getElementById('q-text-p').textContent=q.text;
  const img=document.getElementById('q-img-p');
  img.style.display=q.img?'block':'none'; if(q.img) img.src=q.img;
  document.getElementById('answered-msg').style.display='none';
  const opts=document.getElementById('p-opts');
  opts.innerHTML='';
  q.opts.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='p-opt-btn'; btn.textContent=opt;
    btn.onclick=()=>selectAnswer(i,q);
    opts.appendChild(btn);
  });
  qStartTime=Date.now();
  startPlayerTimer();
}

function selectAnswer(idx,q){
  if(answered) return;
  answered=true; myLastAnswer=idx;
  const elapsed=Date.now()-qStartTime;
  clearInterval(timerInt);
  document.querySelectorAll('.p-opt-btn').forEach((b,i)=>{
    b.disabled=true;
    if(i===idx) b.classList.add('selected');
  });
  document.getElementById('answered-msg').style.display='block';
  set(ref(db,`${SESSION}/answers/${myId}`),{answer:idx,elapsed});
}

function doReveal(correct){
  clearInterval(timerInt);
  const wasCorrect=myLastAnswer===correct;
  document.querySelectorAll('.p-opt-btn').forEach((b,i)=>{
    b.disabled=true;
    b.classList.remove('selected');
    if(i===correct) b.classList.add('correct');
    else if(i===myLastAnswer) b.classList.add('wrong');
  });
  const popup=document.getElementById('reveal-popup');
  document.getElementById('reveal-result').textContent=myLastAnswer===-1?'⏰':wasCorrect?'✅':'❌';
  document.getElementById('pts-gained').textContent=myLastAnswer===-1?'הזמן נגמר':wasCorrect?'+נקודות! (עודכן בניקוד)':'לא הצלחת הפעם';
  document.getElementById('reveal-correct-text').textContent=`התשובה הנכונה: ${getOptText(correct)}`;
  document.getElementById('reveal-expl').textContent='';
  document.getElementById('reveal-wait').textContent='⏳ ממתין לשאלה הבאה...';
  popup.classList.add('show');
}

function getOptText(idx){
  const btns=document.querySelectorAll('.p-opt-btn');
  return btns[idx]?btns[idx].textContent:'';
}

function startPlayerTimer(){
  clearInterval(timerInt);
  let t=30;
  const el=document.getElementById('p-timer');
  el.textContent=t; el.classList.remove('urgent');
  timerInt=setInterval(()=>{
    t--; el.textContent=t;
    if(t<=5) el.classList.add('urgent');
    if(t<=0){clearInterval(timerInt);if(!answered){answered=true;el.textContent='⏰';}}
  },1000);
}

function showEndScreen(){
  clearInterval(timerInt);
  document.getElementById('reveal-popup').classList.remove('show');
  document.getElementById('final-score').textContent=myScore;
  showScreen('end-screen-p');
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

window.joinGame=joinGame;
</script>
</body>
</html>
